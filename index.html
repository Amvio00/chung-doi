<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lễ Thành Hôn Mai Đức Huy & Nguyễn Thị Minh Trân</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Quicksand:wght@300;400;500;600&family=Pattaya&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        :root {
            --dark-green-bg: #1a2e05; /* Tông xanh đậm từ ảnh nền */
            --soft-white: #fdfdfd;
            --text-gold: #b28e72;
        }

        body {
            margin: 0;
            font-family: 'Quicksand', sans-serif;
            background-color: var(--dark-green-bg);
            overflow: hidden;
        }

        /* NỀN XANH SỬ DỤNG ANHBIA.JPG */
        #wedding-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            background-image: url('anhbia.jpg'); /* Sử dụng ảnh gốc của bạn */
            background-size: cover;
            background-position: center;
            transition: 1s ease-in-out;
        }

        /* KHUNG TRẮNG NỘI DUNG */
        .cover-card {
            background-color: var(--soft-white);
            padding: 40px 25px;
            width: 88%;
            max-width: 480px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        /* HOA ĐÀO 3.WEBP THAY THẾ HOA XANH */
        .cover-card::before {
            content: "";
            position: absolute;
            top: -20px;
            left: -20px;
            width: 180px;
            height: 220px;
            background-image: url('3.webp'); /* File hoa đào bạn cung cấp */
            background-size: contain;
            background-repeat: no-repeat;
            opacity: 0.9;
            z-index: 1;
        }

        .content-wrap { position: relative; z-index: 2; }

        .icon-heart { color: var(--dark-green-bg); font-size: 2rem; margin-bottom: 10px; }
        
        .names {
            font-family: 'Great Vibes', cursive;
            font-size: 3.2rem;
            color: var(--dark-green-bg);
            margin: 10px 0;
        }

        /* Ô NHẬP TÊN KHÁCH MỜI GIỐNG THIỆP HỒNG */
        .guest-box {
            background: rgba(26, 46, 5, 0.05);
            border-radius: 10px;
            padding: 10px 20px;
            margin: 20px auto;
            display: inline-block;
            min-width: 200px;
            color: #d04b5a; /* Giữ tông hồng cho tên khách để nổi bật */
            font-weight: 600;
            font-size: 1.1rem;
        }

        .btn-open {
            background-color: #7a2b2d; /* Màu đỏ mận của hoa đào */
            color: white;
            border: none;
            padding: 12px 45px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1.1rem;
            margin-top: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* PHẦN CHI TIẾT SAU KHI MỞ */
        #main-content {
            display: none;
            background: var(--soft-white);
            min-height: 100vh;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div id="wedding-overlay">
        <div class="cover-card" data-aos="zoom-in">
            <div class="content-wrap">
                <div class="icon-heart">❤</div>
                <div class="names">Đức Huy</div>
                <div style="font-size: 1.5rem; color: var(--text-gold);">&</div>
                <div class="names">Minh Trân</div>
                
                <p style="margin: 15px 0 5px; letter-spacing: 2px;">9 THÁNG 5, 2026</p>
                <p style="font-size: 0.9rem; color: #888;">THÂN MỜI</p>
                
                <div class="guest-box">
                    Anh Minh Khôi
                </div>
                
                <p style="font-size: 0.85rem; color: #666; margin-bottom: 20px;">đến dự buổi tiệc chung vui cùng gia đình</p>
                
                <button class="btn-open" onclick="openCard()">Mở thiệp</button>
            </div>
        </div>
    </div>

    <div id="main-content">
        </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();
        function openCard() {
            const overlay = document.getElementById('wedding-overlay');
            overlay.style.opacity = '0';
            overlay.style.transform = 'scale(1.2)';
            setTimeout(() => {
                overlay.style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                document.body.style.overflow = 'auto';
            }, 1000);
        }
    </script>
</body>
</html>
