<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đức Huy & Minh Trân Wedding</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Playfair Display', serif;
            background-color: #ffffff; /* Nền trắng trong trẻo */
            overflow-x: hidden;
        }

        /* Container chính với họa tiết hoa lá ở góc */
        .main-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 40px 20px;
            /* Giả lập họa tiết hoa lá góc bằng gradient và mask hoặc bạn có thể thay bằng ảnh thật */
            background: 
                radial-gradient(circle at top right, rgba(74, 93, 74, 0.05), transparent 400px),
                radial-gradient(circle at bottom left, rgba(74, 93, 74, 0.05), transparent 400px);
        }

        /* Họa tiết lá xanh trang trí góc (giả lập phong cách watercolor) */
        .decoration {
            position: absolute;
            z-index: 1;
            opacity: 0.6;
            pointer-events: none;
        }
        .top-right { top: 0; right: 0; width: 300px; }
        .bottom-left { bottom: 0; left: 0; width: 250px; transform: rotate(180deg); }

        .couple-layout {
            display: flex;
            gap: 80px;
            justify-content: center;
            align-items: flex-start;
            position: relative;
            z-index: 10;
            max-width: 1100px;
            width: 100%;
        }

        .person-block {
            text-align: center;
            flex: 1;
            opacity: 0;
            transform: translateY(30px);
            animation: softAppear 2s ease-out forwards;
        }
        .codau-block { animation-delay: 0.6s; }

        /* Khung ảnh trắng có viền mỏng tinh tế */
        .img-frame {
            background: white;
            padding: 10px;
            border: 1px solid #f0f0f0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-bottom: 25px;
            display: inline-block;
        }

        .couple-img {
            width: 100%;
            max-width: 300px;
            display: block;
            /* Giữ nguyên độ sáng ảnh cưới */
        }

        .role-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            color: #999;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .name-text {
            font-size: 2.8rem;
            color: #4a5d4a; /* Màu xanh lá sẫm như mẫu */
            font-weight: 600;
            margin: 0;
        }

        @keyframes softAppear {
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .couple-layout { flex-direction: column; align-items: center; gap: 50px; }
            .top-right, .bottom-left { width: 150px; }
        }
    </style>
</head>
<body>

    <img src="https://www.transparentpng.com/download/leaves/green-leaves-watercolor-png-free-11.png" class="decoration top-right" alt="decor">
    <img src="https://www.transparentpng.com/download/leaves/green-leaves-watercolor-png-free-11.png" class="decoration bottom-left" alt="decor">

    <div class="main-container">
        <div class="couple-layout">
            <div class="person-block chure-block">
                <div class="img-frame">
                    <img src="chure.webp" alt="Đức Huy" class="couple-img">
                </div>
                <div class="role-text">Chú Rể</div>
                <div class="name-text">Đức Huy</div>
            </div>

            <div class="person-block codau-block">
                <div class="img-frame">
                    <img src="codau.webp" alt="Minh Trân" class="couple-img">
                </div>
                <div class="role-text">Cô Dâu</div>
                <div class="name-text">Minh Trân</div>
            </div>
        </div>
    </div>

</body>
</html>
