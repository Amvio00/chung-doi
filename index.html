<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đức Huy & Minh Trân Wedding</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Quicksand:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        :root {
            --primary-dark: #7a2b2d;
            --glass-white: rgba(255, 255, 255, 0.6); 
            --gold-line: #c4a484;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Quicksand', sans-serif;
            background-color: #fff;
            overflow: hidden; /* Khóa cuộn khi chưa mở thiệp */
        }

        /* CANVAS CÁNH HOA */
        #petal-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        /* MÀN HÌNH CHÀO */
        #wedding-overlay {
            position: fixed; inset: 0;
            display: flex; justify-content: center; align-items: center;
            z-index: 1000;
            background-image: url('anhbia.jpg'); /* Đảm bảo file này có trong thư mục */
            background-size: cover;
            background-position: center;
            transition: opacity 1.5s ease, transform 1.5s ease;
        }

        .main-card {
            width: 85%; max-width: 420px;
            padding: 10px;
            border: 1px solid var(--gold-line);
            border-radius: 25px;
            background: var(--glass-white);
            backdrop-filter: blur(12px);
            text-align: center;
        }

        .names {
            font-family: 'Great Vibes', cursive;
            font-size: 3.3rem;
            color: #2d3826; 
            margin: 10px 0;
        }

        .btn-open {
            background-color: var(--primary-dark);
            color: white; border: none;
            padding: 13px 50px; border-radius: 30px;
            font-size: 1rem; cursor: pointer;
            margin-top: 20px;
        }

        /* HIỆU ỨNG THOÁT */
        .stage-exit {
            opacity: 0 !important;
            transform: scale(1.1) !important;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <canvas id="petal-canvas"></canvas>

    <div id="wedding-overlay">
        <div class="main-card" data-aos="zoom-in">
            <p style="letter-spacing: 3px; font-size: 0.75rem; color: #555;">WEDDING INVITATION</p>
            <div class="names">Đức Huy</div>
            <div style="font-family: 'Great Vibes'; font-size: 1.5rem;">&</div>
            <div class="names">Minh Trân</div>
            <button class="btn-open" onclick="openWedding()">Mở thiệp</button>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // 1. Khởi tạo hiệu ứng cánh hoa
        const canvas = document.getElementById('petal-canvas');
        const ctx = canvas.getContext('2d');
        let w, h, petals = [];

        function initCanvas() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', initCanvas);
        initCanvas();

        class Petal {
            constructor() {
                this.x = Math.random() * w;
                this.y = Math.random() * h - h;
                this.size = Math.random() * 7 + 5;
                this.speed = Math.random() * 1 + 1;
                this.angle = Math.random() * 360;
                this.spin = Math.random() * 2 - 1;
            }
            update() {
                this.y += this.speed;
                this.angle += this.spin;
                if (this.y > h) this.y = -20;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle * Math.PI / 180);
                ctx.beginPath();
                ctx.ellipse(0, 0, this.size, this.size/1.5, 0, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 183, 197, 0.8)';
                ctx.fill();
                ctx.restore();
            }
        }

        for (let i = 0; i < 30; i++) petals.push(new Petal());

        function animate() {
            ctx.clearRect(0, 0, w, h);
            petals.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        // 2. Logic bấm nút
        AOS.init();
        function openWedding() {
            document.getElementById('wedding-overlay').classList.add('stage-exit');
            alert("Đã bấm mở! Tiếp theo mình sẽ code phần hiện ảnh nhé.");
        }
    </script>
</body>
</html>
