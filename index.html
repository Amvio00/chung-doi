<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đức Huy & Minh Trân Wedding</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Quicksand:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        :root {
            --primary-dark: #7a2b2d;
            --glass-white: rgba(255, 255, 255, 0.6); 
            --gold-line: #c4a484;
            --dark-green: #30530f;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Quicksand', sans-serif;
            background-color: #fff;
            overflow-x: hidden;
        }

        /* HIỆU ỨNG CÁNH HOA RƠI */
        .petal {
            position: fixed;
            top: -10%;
            z-index: 9999;
            user-select: none;
            pointer-events: none;
            animation-name: fall;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
        }

        @keyframes fall {
            0% { top: -10%; transform: translateX(0) rotate(0deg); opacity: 1; }
            100% { top: 110%; transform: translateX(100px) rotate(360deg); opacity: 0; }
        }

        /* MÀN HÌNH CHÀO */
        #wedding-overlay {
            position: fixed; inset: 0;
            display: flex; justify-content: center; align-items: center;
            z-index: 1000;
            background-image: url('anhbia.jpg'); 
            background-size: cover;
            background-position: center;
            transition: opacity 1.5s cubic-bezier(0.4, 0, 0.2, 1), transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: opacity, transform;
        }

        .main-card {
            background: var(--glass-white);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 45px 20px;
            width: 85%;
            max-width: 420px;
            border-radius: 25px;
            border: 1px solid var(--gold-line);
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .names { font-family: 'Great Vibes', cursive; font-size: 3.3rem; color: #2d3826; margin: 8px 0; }

        .btn-open {
            background-color: var(--primary-dark);
            color: white; border: none; padding: 13px 50px;
            border-radius: 30px; font-size: 1rem; cursor: pointer;
            margin-top: 15px; box-shadow: 0 4px 15px rgba(122, 43, 45, 0.3);
        }

        /* NỘI DUNG CHÍNH */
        #main-invitation { 
            display: none; opacity: 0;
            min-height: 100vh;
            background-image: url('anhnen2.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            transition: opacity 1.2s ease-out;
        }

        /* Hiệu ứng tan biến */
        .stage-exit { opacity: 0 !important; transform: scale(1.1) !important; pointer-events: none; }
        .stage-enter { opacity: 1 !important; display: block !important; }

        /* Bố cục ảnh Cô dâu - Chú rể */
        .couple-section {
            display: flex; justify-content: center; gap: 20px;
            padding: 100px 20px 50px; flex-wrap: wrap;
        }
        .couple-card {
            width: 300px; text-align: center;
            background: rgba(255,255,255,0.8);
            padding: 15px; border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .couple-card img { width: 100%; border-radius: 10px; }
        .couple-card h3 { font-family: 'Great Vibes'; font-size: 2rem; color: var(--primary-dark); margin: 15px 0 5px; }
    </style>
</head>
<body>

    <div id="wedding-overlay">
        <div class="main-card" data-aos="zoom-in">
            <div class="names">Đức Huy</div>
            <div style="font-size: 1.6rem; color: var(--gold-line); font-family: 'Great Vibes';">&</div>
            <div class="names">Minh Trân</div>
            <p style="letter-spacing: 2px;">09.05.2026</p>
            <button class="btn-open" onclick="openWedding()">Mở thiệp</button>
        </div>
    </div>

    <div id="main-invitation">
        <div class="couple-section">
            <div class="couple-card" data-aos="fade-right">
                <img src="chure.jpg" alt="Chú rể">
                <h3>Chú rể Đức Huy</h3>
            </div>
            <div class="couple-card" data-aos="fade-left">
                <img src="codau.jpg" alt="Cô dâu">
                <h3>Cô dâu Minh Trân</h3>
            </div>
        </div>

        <div style="text-align: center; padding: 50px 20px; background: rgba(255,255,255,0.7); margin: 20px; border-radius: 20px;">
            <h2 style="font-family: 'Great Vibes'; font-size: 3rem; color: var(--primary-dark);">Happy Wedding</h2>
            <p>Sự hiện diện của bạn là niềm vinh hạnh của chúng tôi!</p>
            </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
