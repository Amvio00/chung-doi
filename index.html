<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đức Huy & Minh Trân Wedding | Gấu & Mèo Con</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Quicksand:wght@300;400;500;600&family=Pattaya&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        :root {
            --bg-fade: #f9fbf7; /* Tông kem xanh nhạt */
            --dark-green: #30530f; /* Màu xanh lá đậm cho tiêu đề */
            --warm-pink: #d88a8a; 
            --accent-green: #8da67c;
        }

        body {
            margin: 0;
            font-family: 'Quicksand', sans-serif;
            color: #4a4a4a;
            background-color: var(--bg-fade);
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
        }

        /* --- OVERLAY MỞ THIỆP (Sửa lỗi trắng xóa) --- */
        #wedding-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(rgba(249, 251, 247, 0.8), rgba(249, 251, 247, 0.8)),
                        url('chure.webp'); /* Hiển thị ảnh chure.webp làm nền mờ */
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 1s, visibility 1s;
        }

        .cover-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 50px 30px;
            width: 85%;
            max-width: 450px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            border: 1px solid var(--accent-green);
        }
