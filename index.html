<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đức Huy & Minh Trân Wedding</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Quicksand:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        :root {
            --primary-dark: #7a2b2d;
            --glass-white: rgba(255, 255, 255, 0.6); 
            --gold-line: #c4a484;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Quicksand', sans-serif;
            background-color: #fff; /* Chuyển nền body thành trắng để khớp với nội dung sau */
        }

        /* MÀN HÌNH CHÀO */
        #wedding-overlay {
            position: fixed; inset: 0;
            display: flex; justify-content: center; align-items: center;
            z-index: 1000;
            background-image: url('anhbia.jpg'); 
            background-size: cover;
            background-position: center;
            /* TĂNG THỜI GIAN VÀ KIỂU CHUYỂN CẢNH */
            transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1), 
                        transform 1.2s cubic-bezier(0.4, 0, 0.2, 1),
                        filter 1.2s ease;
        }

        .main-card {
            position: relative;
            width: 85%;
            max-width: 420px;
            padding: 10px;
            border: 1px solid var(--gold-line);
            border-radius: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            background: transparent;
        }

        .glass-content {
            background: var(--glass-white);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 45px 20px;
            border-radius: 20px;
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .icon-heart { color: var(--primary-dark); font-size: 1.5rem; margin-bottom: 5px; }
        
        .names {
            font-family: 'Great Vibes', cursive;
            font-size: 3.3rem;
            color: #2d3826; 
            margin: 8px 0;
            line-height: 1.1;
            text-shadow: 0 2px 4px rgba(255,255,255,0.5);
        }

        .date-text {
            letter-spacing: 4px;
            font-size: 0.9rem;
            color: #444;
            margin: 15px 0;
            border-top: 1px solid rgba(0,0,0,0.1);
            border-bottom: 1px solid rgba(0,0,0,0.1);
            padding: 5px 0;
            display: inline-block;
        }

        .guest-box {
            background: rgba(122, 43, 45, 0.12);
            color: var(--primary-dark);
            padding: 10px 25px;
            border-radius: 30px;
            display: inline-block;
            font-weight: 600;
            margin: 20px 0;
            min-width: 180px;
            border: 0.5px solid rgba(122, 43, 45, 0.2);
        }

        .btn-open {
            background-color: var(--primary-dark);
            color: white;
            border: none;
            padding: 13px 50px;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 4px 15px rgba(122, 43, 45, 0.3);
            transition: 0.3s;
        }

        /* NỘI DUNG CHÍNH */
        #main-invitation { 
            opacity: 0; 
            display: none; 
            background: white; 
            min-height: 100vh;
            transition: opacity 1s ease-in;
        }

        /* Lớp phủ để làm mờ dần khi chuyển cảnh */
        .fade-out {
            opacity: 0 !important;
            transform: scale(1.05) !important;
            filter: blur(10px);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="wedding-overlay">
        <div class="main-card" data-aos="zoom-in" data-aos-duration="1200">
            <div class="glass-content">
                <div class="icon-heart">❤</div>
                <p style="letter-spacing: 3px; font-size: 0.75rem; color: #555; margin-bottom: 0; font-weight: 600;">WEDDING INVITATION</p>
                
                <div class="names">Đức Huy</div>
                <div style="font-size: 1.6rem; color: var(--gold-line); font-family: 'Great Vibes'; margin: -5px 0;">&</div>
                <div class="names">Minh Trân</div>
                
                <div class="date-text">09 . 05 . 2026</div>
                
                <p style="font-size: 0.8rem; color: #555; margin-top: 20px; letter-spacing: 1px; font-weight: 600;">THÂN MỜI</p>
                
                <div class="guest-box">
                    Anh Minh Khôi
                </div>
                
                <p style="font-size: 0.82rem; color: #444; line-height: 1.4; font-weight: 500;">Đến dự buổi tiệc chung vui<br>cùng gia đình chúng tôi</p>
                
                <button class="btn-open" onclick="openWedding()">Mở thiệp</button>
            </div>
        </div>
    </div>

    <div id="main-invitation">
        <div style="padding: 100px 20px; text-align: center;">
            <h1 style="font-family: 'Great Vibes'; font-size: 3rem; color: var(--primary-dark);">Chào mừng bạn đến với tiệc cưới</h1>
            <p>Nội dung chi tiết sẽ hiện ra ở đây...</p>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();
        function openWedding() {
            const overlay = document.getElementById('wedding-overlay');
            const mainContent = document.getElementById('main-invitation');
            
            // 1. Thêm class để hiệu ứng transition bắt đầu chạy mượt
            overlay.classList.add('fade-out');
            
            // 2. Sau khi hiệu ứng mờ kết thúc (khoảng 800ms)
            setTimeout(() => {
                overlay.style.display = 'none';
                
                // 3. Hiển thị nội dung chính và làm nó hiện dần lên
                mainContent.style.display = 'block';
                setTimeout(() => {
                    mainContent.style.opacity = '1';
                    window.scrollTo(0, 0);
                    // Khởi động lại AOS để các phần tử trong nội dung chính chạy animation
                    AOS.refresh();
                }, 50);
            }, 1000);
        }
    </script>
</body>
</html>
