<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đức Huy & Minh Trân Wedding</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <style>
        /* Đảm bảo khung hình luôn hiện */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            background-color: #f5f5f5; /* Nền xám nhạt phòng hờ ảnh lỗi */
        }

        .wrapper {
            /* SỬ DỤNG ẢNH NỀN CỦA BẠN */
            background-image: url('anhnen2.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            display: flex;
            gap: 40px;
            max-width: 1000px;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap; /* Tự xuống hàng trên điện thoại */
        }

        .box {
            text-align: center;
            /* Hiệu ứng hiện ra nhẹ nhàng */
            animation: fadeIn 2s ease-out forwards;
        }

        .box-cd { animation-delay: 0.8s; opacity: 0; }

        .frame {
            background: #fff;
            padding: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: inline-block;
        }

        .img {
            width: 280px; /* Độ rộng ảnh */
            height: auto;
            display: block;
        }

        .label {
            font-size: 0.9rem;
            color: #666;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .name {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            color: #4a5d4a; /* Màu xanh sẫm */
            margin: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile */
        @media (max-width: 600px) {
            .img { width: 220px; }
            .name { font-size: 2.2rem; }
            .container { gap: 20px; }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="container">
            
            <div class="box box-cr">
                <div class="frame">
                    <img src="chure.webp" alt="Chú Rể" class="img">
                </div>
                <div class="label">Chú Rể</div>
                <div class="name">Đức Huy</div>
            </div>

            <div class="box box-cd">
                <div class="frame">
                    <img src="codau.webp" alt="Cô Dâu" class="img">
                </div>
                <div class="label">Cô Dâu</div>
                <div class="name">Minh Trân</div>
            </div>

        </div>
    </div>

</body>
</html>
