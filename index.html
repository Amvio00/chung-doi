<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thiệp Cưới Online</title>
    <style>
        /* Cấu hình nền cho toàn bộ trang */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        .background {
            background-image: url('anhnen2.jpg'); /* Đảm bảo file này cùng thư mục trên GitHub */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Container chứa ảnh cô dâu chú rể */
        .couple-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            margin-top: 50px;
        }

        /* Định dạng chung cho ảnh */
        .image-wrapper {
            opacity: 0; /* Ban đầu ẩn đi */
            transform: translateY(30px); /* Đẩy xuống một chút để tạo hiệu ứng trượt lên */
            animation: fadeInUp 2.5s ease-out forwards; /* Chạy animation */
        }

        .couple-img {
            width: 250px; /* Bạn có thể điều chỉnh kích thước */
            height: 350px;
            object-fit: cover;
            border-radius: 150px 150px 0 0; /* Tạo hình vòm sang trọng */
            border: 5px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* Delay để ảnh chú rể hiện trước hoặc cả hai hiện cùng lúc */
        .chure {
            animation-delay: 0.5s;
        }

        .codau {
            animation-delay: 1.2s; /* Cô dâu hiện sau một chút tạo sự nhịp nhàng */
        }

        /* Hiệu ứng Animation */
        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
                filter: blur(5px);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        /* Thêm hiệu ứng lấp lánh nhẹ cho chữ */
        .wedding-title {
            color: #d4a373;
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeIn 3s ease-in forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Mobile responsive */
        @media (max-width: 600px) {
            .couple-container {
                flex-direction: column;
            }
            .couple-img {
                width: 200px;
                height: 280px;
            }
        }
    </style>
</head>
<body>

    <div class="background">
        <h1 class="wedding-title">Our Wedding</h1>

        <div class="couple-container">
            <div class="image-wrapper chure">
                <img src="chure.webp" alt="Chú Rể" class="couple-img">
                <p style="text-align:center; color: #fff; font-weight: bold;">CHÚ RỂ</p>
            </div>

            <div class="image-wrapper codau">
                <img src="codau.webp" alt="Cô Dâu" class="couple-img">
                <p style="text-align:center; color: #fff; font-weight: bold;">CÔ DÂU</p>
            </div>
        </div>
    </div>

</body>
</html>
