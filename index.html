<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đức Huy & Minh Trân Wedding</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Quicksand:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        :root {
            --primary-dark: #7a2b2d;
            --glass-white: rgba(255, 255, 255, 0.6); 
            --gold-line: #c4a484;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Quicksand', sans-serif;
            background-color: #fff;
            overflow-x: hidden;
        }

        /* CANVAS CÁNH HOA */
        #petal-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        /* MÀN HÌNH CHÀO */
        #wedding-overlay {
            position: fixed; inset: 0;
            display: flex; justify-content: center; align-items: center;
            z-index: 1000;
            background-image: url('anhbia.jpg'); 
            background-size: cover;
            background-position: center;
            transition: opacity 1.5s cubic-bezier(0.4, 0, 0.2, 1), transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: opacity, transform;
        }

        .main-card {
            position: relative;
            width: 85%; max-width: 420px;
            padding: 10px;
            border: 1px solid var(--gold-line);
            border-radius: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .glass-content {
            background: var(--glass-white);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            padding: 45px 20px;
            border-radius: 20px;
            text-align: center;
        }

        .names {
            font-family: 'Great Vibes', cursive;
            font-size: 3.3rem;
            color: #2d3826; 
            margin: 8px 0;
            line-height: 1.1;
        }

        .btn-open {
            background-color: var(--primary-dark);
            color: white; border: none;
            padding: 13px 50px;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(122, 43, 45, 0.3);
        }

        /* NỘI DUNG CHÍNH */
        #main-invitation { 
            display: none;
            opacity: 0; 
            min-height: 100vh;
            /* Bước 1: Thêm nền anhnen2.jpg */
            background-image: url('anhnen2.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed; /* Giữ nền cố định khi cuộn */
            transition: opacity 1.2s ease-out;
            padding-bottom: 50px;
        }

        /* Bố cục ảnh Cô dâu & Chú rể */
        .couple-wrap {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            padding: 80px 15px 40px;
            flex-wrap: wrap; /* Tự xuống dòng trên điện thoại */
        }

        .photo-box {
            background: white;
            padding: 10px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            max-width: 280px;
            transition: transform 0.5s ease;
        }

        .photo-box:hover { transform: translateY(-10px); }

        .photo-box img {
            width: 100%;
            border-radius: 10px;
            display: block;
        }

        .photo-box p {
            font-family: 'Great Vibes';
            font-size: 2rem;
            margin: 15px 0 5px;
            color: var(--primary-dark);
        }

        /* Hiệu ứng chuyển cảnh */
        .stage-exit {
            opacity: 0 !important;
            transform: scale(1.1) !important;
            pointer-events: none;
        }

        .stage-enter {
            opacity: 1 !important;
        }
    </style>
</head>
<body>

    <canvas id="petal-canvas"></canvas>

    <div id="wedding-overlay">
        <div class="main-card" data-aos="zoom-in">
            <div class="glass-content">
                <div style="color: var(--primary-dark); font-size: 1.5rem;">❤</div>
                <p style="letter-spacing: 3px; font-size: 0.75rem; color: #555; font-weight: 600;">WEDDING INVITATION</p>
                <div class="names">Đức Huy</div>
                <div style="font-size: 1.6rem; color: var(--gold-line); font-family: 'Great Vibes';">&</div>
                <div class="names">Minh Trân</div>
                <button class="btn-open" onclick="openWedding()">Mở thiệp</button>
            </div>
        </div>
    </div>

    <div id="main-invitation">
        <div class="couple-wrap">
            <div class="photo-box" data-aos="fade-right" data-aos-delay="500">
                <img src="chure.webp" alt="Chú rể">
                <p>Chú rể Đức Huy</p>
            </div>

            <div style="font-family: 'Great Vibes'; font-size: 3rem; color: white; text-shadow: 2px 2px 5px rgba(0,0,0,0.3);"> & </div>

            <div class="photo-box" data-aos="fade-left" data-aos-delay="800">
                <img src="codau.webp" alt="Cô dâu">
                <p>Cô dâu Minh Trân</p>
            </div>
        </div>

        <div style="text-align: center; color: white; padding: 20px;">
             <h1 style="font-family: 'Great Vibes'; font-size: 3.5rem; text-shadow: 2px 2px 10px rgba(0,0,0,0.5);">Happy Wedding</h1>
             <p style="background: rgba(0,0,0,0.2); display: inline-block; padding: 10px 20px; border-radius: 20px;">Cảm ơn bạn đã tham gia cùng chúng tôi!</p>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // --- 1. HIỆU ỨNG CÁNH HOA RƠI (GIỮ NGUYÊN) ---
        const canvas = document.getElementById('petal-canvas');
        const ctx = canvas.getContext('2d');
        let w, h, petals = [];
        function initCanvas() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', initCanvas);
        initCanvas();

        class Petal {
            constructor() {
                this.x = Math.random() * w;
                this.y = Math.random() * h - h;
                this.size = Math.random() * 8 + 5;
                this.speed = Math.random() * 1.5 + 1;
                this.angle = Math.random() * 360;
                this.spin = Math.random() * 2 - 1;
                this.wind = Math.random() * 1 - 0.5;
            }
            update() {
                this.y += this.speed;
                this.x += this.wind;
                this.angle += this.spin;
                if (this.y > h) {
                    this.y = -20;
                    this.x = Math.random() * w;
                }
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle * Math.PI / 180);
                ctx.beginPath();
                ctx.ellipse(0, 0, this.size, this.size/1.5, 0, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 192, 203, 0.7)';
                ctx.fill();
                ctx.restore();
            }
        }
        for (let i = 0; i < 40; i++) petals.push(new Petal());
        function animatePetals() {
            ctx.clearRect(0, 0, w, h);
            petals.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animatePetals);
        }
        animatePetals();

        // --- 2. LOGIC MỞ THIỆP ---
        AOS.init({ duration: 1000, once: true });

        function openWedding() {
            const overlay = document.getElementById('wedding-overlay');
            const mainContent = document.getElementById('main-invitation');
            
            overlay.classList.add('stage-exit');
            mainContent.style.display = 'block';
            
            setTimeout(() => {
                mainContent.classList.add('stage-enter');
                window.scrollTo(0, 0);
            }, 100);

            setTimeout(() => {
                overlay.style.display = 'none';
                document.body.style.overflow = 'auto';
                AOS.refresh(); // Để kích hoạt hiệu ứng fade-right/fade-left của ảnh
            }, 1500);
        }
    </script>
</body>
</html>
