<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đức Huy & Minh Trân Wedding</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Playfair Display', serif;
            overflow-x: hidden;
        }

        .background-container {
            /* Sử dụng ảnh nền anhnen2.jpg của bạn */
            background-image: url('anhnen2.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .couple-layout {
            display: flex;
            gap: 80px;
            justify-content: center;
            align-items: flex-start;
            max-width: 1100px;
            width: 100%;
        }

        /* Khối nội dung từng người */
        .person-block {
            text-align: center;
            flex: 1;
            opacity: 0;
            transform: translateY(40px);
            animation: softSlideUp 2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        .codau-block { animation-delay: 0.8s; }

        /* Khung ảnh trắng tối giản, hiện đại */
        .img-frame {
            background: white;
            padding: 12px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.12);
            margin-bottom: 30px;
            display: inline-block;
            line-height: 0;
        }

        .couple-img {
            width: 100%;
            max-width: 320px;
            height: auto;
            object-fit: cover;
        }

        /* Danh xưng Chú Rể / Cô Dâu */
        .role-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
            color: #888;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 10px;
            opacity: 0;
            animation: fadeInText 1.5s ease-out forwards;
            animation-delay: 1.5s;
        }

        .codau-block .role-text { animation-delay: 2.3s; }
