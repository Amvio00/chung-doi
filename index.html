<style>
    /* CSS Bổ sung để kết nối ảnh cô dâu chú rể */
    .couple-visual {

        gap: 10px; /* Khoảng cách nhỏ tạo sự gần gũi */
        margin: 40px auto;
        max-width: 600px;
    }

    .photo-frame {
        flex: 1;
        max-width: 200px;
        border: 6px solid #fff;
        box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        border-radius: 2px;
        overflow: hidden;
        transition: transform 0.4s ease;
    }

    .photo-frame:hover { transform: rotate(0) scale(1.05); z-index: 10; }

    .photo-frame img {
        width: 100%;
        height: auto;
        display: block;
    }

    .heart-divider {

    @media (max-width: 600px) {

</style>
