<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đức Huy & Minh Trân Wedding</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Quicksand:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        :root {
            --primary-dark: #7a2b2d;
            /* GIẢM ĐỘ ĐẬM NỀN XUỐNG CỰC THẤP (0.3) ĐỂ NHÌN XUYÊN THẤU RÕ RÀNG */
            --glass-white: rgba(255, 255, 255, 0.3); 
            --gold-line: rgba(196, 164, 132, 0.6);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Quicksand', sans-serif;
            background-color: #000;
        }

        #wedding-overlay {
            position: fixed; inset: 0;
            display: flex; justify-content: center; align-items: center;
            z-index: 1000;
            background-image: url('anhbia.jpg'); 
            background-size: cover;
            background-position: center;
            transition: 1.2s;
        }

        .main-card {
            position: relative;
            width: 85%;
            max-width: 420px;
            padding: 8px;
            /* Viền vàng mảnh mai hơn */
            border: 1px solid var(--gold-line);
            border-radius: 30px;
        }

        .glass-content {
            background: var(--glass-white);
            /* GIỮ ĐỘ MỜ NHÒE NHẸ ĐỂ CHỮ KHÔNG BỊ CHÌM VÀO NỀN */
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 50px 20px;
            border-radius: 25px;
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .icon-heart { color: var(--primary-dark); font-size: 1.5rem; margin-bottom: 5px; }
        
        .names {
            font-family: 'Great Vibes', cursive;
            font-size: 3.5rem;
            color: #2d3826; 
            margin: 5px 0;
            line-height: 1.1;
            /* Đổ bóng chữ để dễ đọc trên nền trong suốt */
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }

        .date-text {
            letter-spacing: 4px;
            font-size: 0.9rem;
            color: #333;
            margin: 15px 0;
            border-top: 1px solid rgba(0,0,0,0.1);
            border-bottom: 1px solid rgba(0,0,0,0.1);
            padding: 6px 0;
            display: inline-block;
            font-weight: 600;
        }

        .guest-box {
            background: rgba(122, 43, 45, 0.1);
            color: var(--primary-dark);
            padding: 10px 25px;
            border-radius: 30px;
            display: inline-block;
            font-weight: 700;
            margin: 20px 0;
            min-width: 180px;
            border: 0.5px solid rgba(122, 43, 45, 0.15);
        }

        .btn-open {
            background-color: var(--primary-dark);
            color: white;
            border: none;
            padding: 14px 55px;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        #main-invitation { display: none; background: white; min-height: 100vh; }
    </style>
</head>
<body>

    <div id="wedding-overlay">
        <div class="main-card" data-aos="fade-up" data-aos-duration="1500">
            <div class="glass-content">
                <div class="icon-heart">❤</div>
                <p style="letter-spacing: 3px; font-size: 0.75rem; color: #444; margin-bottom: 0; font-weight: 700;">WEDDING INVITATION</p>
                
                <div class="names">Đức Huy</div>
                <div style="font-size: 1.8rem; color: #b28e72; font-family: 'Great Vibes'; margin: -8px 0;">&</div>
                <div class="names">Minh Trân</div>
                
                <div class="date-text">09 . 05 . 2026</div>
                
                <p style="font-size: 0.8rem; color: #444; margin-top: 20px; letter-spacing: 1px; font-weight: 700;">THÂN MỜI</p>
                
                <div class="guest-box">
                    Anh Minh Khôi
                </div>
                
                <p style="font-size: 0.85rem; color: #333; line-height: 1.4; font-weight: 600;">Đến dự buổi tiệc chung vui<br>cùng gia đình chúng tôi</p>
                
                <button class="btn-open" onclick="openWedding()">Mở thiệp</button>
            </div>
        </div>
    </div>

    <div id="main-invitation">
        </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();
        function openWedding() {
            const overlay = document.getElementById('wedding-overlay');
            overlay.style.opacity = '0';
            overlay.style.filter = 'blur(20px)';
            setTimeout(() => {
                overlay.style.display = 'none';
                document.getElementById('main-invitation').style.display = 'block';
            }, 1000);
        }
    </script>
</body>
</html>
