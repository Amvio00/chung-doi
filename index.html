<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thiệp Cưới Đức Huy & Minh Trân</title>
    <style>
        /* Tông màu Hoa Mộc Xanh: Kem, Xanh lá nhạt, Trắng */
        :root {
            --bg-color: #f9fbf7;
            --text-color: #2d4f1e;
            --accent-color: #8da67c;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png'); /* Hiệu ứng giấy mỹ thuật */
        }

        .invitation-card {
            width: 90%;
            max-width: 800px;
            background: white;
            padding: 40px 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border-radius: 2px;
            text-align: center;
            position: relative;
            border: 1px solid #eee;
            overflow: hidden;
        }

        /* Họa tiết hoa lá góc thiệp (Style Hoa Mộc) */
        .invitation-card::before {
            content: '🌿';
            position: absolute;
            top: -10px;
            left: -10px;
            font-size: 50px;
            opacity: 0.3;
        }

        h2 {
            font-weight: 300;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-size: 14px;
            margin-bottom: 30px;
        }

        /* Bố cục ảnh sát nhau để tạo sự gắn kết */
        .couple-images {
            display: flex;
            justify-content: center;
            gap: 15px; /* Khoảng cách nhỏ để bớt xa cách */
            margin-bottom: 30px;
        }

        .photo-frame {
            width: 45%;
            max-width: 250px;
            border: 8px solid #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .photo-frame:hover {
            transform: translateY(-5px);
        }

        .photo-frame img {
            width: 100%;
            height: auto;
            display: block;
        }

        .names {
            font-size: 42px;
            font-family: 'Georgia', serif;
            margin: 20px 0;
            color: var(--text-color);
        }

        .details {
            font-style: italic;
            border-top: 1px solid var(--accent-color);
            border-bottom: 1px solid var(--accent-color);
            display: inline-block;
            padding: 10px 30px;
            margin-top: 20px;
        }

        /* Tối ưu cho điện thoại */
        @media (max-width: 600px) {
            .names { font-size: 32px; }
            .couple-images { gap: 8px; }
            .invitation-card { padding: 25px 15px; }
        }
    </style>
</head>
<body>

    <div class="invitation-card">
        <h2>Hân hoan kính báo</h2>
        
        <div class="couple-images">
            <div class="photo-frame">
                <img src="chu-re.jpg" alt="Chú rể Đức Huy">
                <p style="font-size: 12px; margin-top: 5px;">CHÚ RỂ</p>
            </div>
            <div class="photo-frame">
                <img src="co-dau.jpg" alt="Cô dâu Minh Trân">
                <p style="font-size: 12px; margin-top: 5px;">CÔ DÂU</p>
            </div>
        </div>

        <div class="names">
            Đức Huy & Minh Trân
        </div>

        <div class="details">
            Lễ Thành Hôn rạng rỡ niềm vui
        </div>

        <p style="margin-top: 30px; font-size: 13px; opacity: 0.7;">
            Sự hiện diện của quý vị là niềm vinh hạnh của gia đình chúng tôi
        </p>
    </div>

</body>
</html>
