<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lễ Thành Hôn Mai Đức Huy & Nguyễn Thị Minh Trân</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Quicksand:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        :root {
            --primary-dark: #7a2b2d;
            --glass-white: rgba(255, 255, 255, 0.85); /* Nền trắng mờ */
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Quicksand', sans-serif;
        }

        /* NỀN TOÀN TRANG SỬ DỤNG ANHBIA.JPG */
        #wedding-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            background-image: url('anhbia.jpg'); /* Đảm bảo file này có trên GitHub */
            background-size: cover;
            background-position: center;
            transition: transform 1s ease-in-out, opacity 1s;
        }

        /* KHUNG THIỆP DẠNG TRẮNG MỜ (GLASSMORPHISM) */
        .glass-card {
            background: var(--glass-white);
            backdrop-filter: blur(10px); /* Hiệu ứng làm mờ hình nền phía sau */
            -webkit-backdrop-filter: blur(10px);
            padding: 50px 30px;
            width: 85%;
            max-width: 450px;
            border-radius: 30px; /* Bo góc tròn như hình mẫu */
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            position: relative;
        }

        /* HỌA TIẾT GÓC MẢNH NHƯ HÌNH MẪU */
        .glass-card::before, .glass-card::after {
            content: "";
            position: absolute;
            width: 80px;
            height: 80px;
            background-size: contain;
            background-repeat: no-repeat;
            opacity: 0.6;
        }
        .glass-card::before {
            top: 15px; left: 15px;
            background-image: url('https://www.transparentpng.com/download/floral/gold-floral-corner-decoration-png-15.png'); /* Họa tiết lá vàng mảnh */
        }
        .glass-card::after {
            bottom: 15px; right: 15px;
            transform: rotate(180deg);
            background-image: url('https://www.transparentpng.com/download/floral/gold-floral-corner-decoration-png-15.png');
        }

        .icon-heart { color: var(--primary-dark); font-size: 1.5rem; margin-bottom: 10px; }
        
        .names {
            font-family: 'Great Vibes', cursive;
            font-size: 3.5rem;
            color: #3e4a36; /* Màu xanh đen sang trọng */
            margin: 10px 0;
            line-height: 1.2;
        }

        .date-text {
            letter-spacing: 3px;
            font-size: 1.1rem;
            color: #666;
            margin: 20px 0 5px;
        }

        .guest-tag {
            background: rgba(122, 43, 45, 0.1);
            color: var(--primary-dark);
            padding: 8px 25px;
            border-radius: 15px;
            display: inline-block;
            font-weight: 600;
            margin: 15px 0;
            min-width: 180px;
        }

        .btn-open {
            background-color: var(--primary-dark);
            color: white;
            border: none;
            padding: 14px 50px;
            border-radius: 30px;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 25px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(122, 43, 45, 0.3);
        }

        .btn-open:hover { transform: scale(1.05); background-color: #5a1f21; }

        /* NỘI DUNG CHÍNH */
        #main-content { display: none; }
    </style>
</head>
<body>

    <div id="wedding-overlay">
        <div class="glass-card" data-aos="zoom-in" data-aos-duration="1500">
            <div class="icon-heart">❤</div>
            
            <div class="names">Đức Huy</div>
            <div style="font-size: 1.8rem; color: #b28e72; font-family: 'Great Vibes';">&</div>
            <div class="names">Minh Trân</div>
            
            <div class="date-text">09 . 05 . 2026</div>
            
            <p style="font-size: 0.8rem; color: #888; letter-spacing: 2px; margin-top: 25px;">THÂN MỜI</p>
            
            <div class="guest-tag">
                Anh Minh Khôi
            </div>
            
            <p style="font-size: 0.85rem; color: #777;">đến dự buổi tiệc chung vui cùng gia đình</p>
            
            <button class="btn-open" onclick="openWedding()">Mở thiệp</button>
        </div>
    </div>

    <div id="main-content">
        </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();
        function openWedding() {
            const overlay = document.getElementById('wedding-overlay');
            overlay.style.opacity = '0';
            overlay.style.transform = 'translateY(-100%)';
            setTimeout(() => {
                overlay.style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                window.scrollTo(0, 0);
            }, 1000);
        }
    </script>
</body>
</html>
