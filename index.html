<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đức Huy & Minh Trân Wedding</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Playfair Display', serif;
            overflow-x: hidden;
        }

        .background-container {
            /* SỬ DỤNG ẢNH NỀN LUNG LINH CỦA BẠN */
            /* Đảm bảo đường dẫn ảnh này chính xác và file nằm cùng thư mục */
            background-image: url('anhnen2.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        /* Bố cục nội dung chính */
        .couple-layout {
            display: flex;
            gap: 80px;
            justify-content: center;
            align-items: flex-start;
            max-width: 1100px;
            width: 100%;
        }

        /* Khối nội dung từng người */
        .person-block {
            text-align: center;
            flex: 1;
            opacity: 0;
            transform: translateY(40px);
            animation: softSlideUp 2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        .codau-block { animation-delay: 0.8s; }

        /* Khung ảnh trắng tối giản, hiện đại */
        .img-frame {
            background: white;
            padding: 12px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.12);
            margin-bottom: 30px;
            display: inline-block;
            line-height: 0;
        }

        .couple-img {
            width: 100%;
            max-width: 320px;
            height: auto;
            object-fit: cover;
            /* --- KỸ THUẬT BLEND MODE ĐỂ KHÔNG BỊ TỐI --- */
            mix-blend-mode: multiply; /* Hòa trộn để giữ độ sáng gương mặt */
        }

        /* Danh xưng Chú Rể / Cô Dâu */
        .role-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
            color: #888;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 10px;
            opacity: 0;
            animation: fadeInText 1.5s ease-out forwards;
            animation-delay: 1.5s;
        }

        .codau-block .role-text { animation-delay: 2.3s; }

        /* Tên chính - Font Playfair Display mới */
        .name-text {
            font-size: 3.2rem;
            color: #4a5d4a; /* Màu xanh lá sẫm tinh tế */
            margin: 0;
            font-weight: 600;
            letter-spacing: 1px;
            opacity: 0;
            animation: fadeInText 1.5s ease-out forwards;
            animation-delay: 1.8s;
        }

        .codau-block .name-text { animation-delay: 2.6s; }

        /* Animations */
        @keyframes softSlideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInText {
            to { opacity: 1; }
        }

        /* Responsive cho Mobile */
        @media (max-width: 768px) {
            .couple-layout { flex-direction: column; align-items: center; gap: 60px; }
            .name-text { font-size: 2.5rem; }
            .couple-img { max-width: 260px; }
        }
    </style>
</head>
<body>

    <div class="background-container">
        <div class="couple-layout">
            
            <div class="person-block chure-block">
                <div class="img-frame">
                    <img src="chure.webp" alt="Chú Rể Đức Huy" class="couple-img">
                </div>
                <div class="role-text">Chú Rể</div>
                <div class="name-text">Đức Huy</div>
            </div>

            <div class="person-block codau-block">
                <div class="img-frame">
                    <img src="codau.webp" alt="Cô Dâu Minh Trân" class="couple-img">
                </div>
                <div class="role-text">Cô Dâu</div>
                <div class="name-text">Minh Trân</div>
            </div>

        </div>
    </div>

</body>
</html>
