<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đức Huy & Minh Trân Wedding</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Quicksand:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        :root {
            --primary-dark: #7a2b2d;
            --glass-white: rgba(255, 255, 255, 0.6); 
            --gold-line: #c4a484;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Quicksand', sans-serif;
            background-color: #fff;
            overflow-x: hidden;
        }

        /* --- PHẦN 1: MÀN HÌNH CHÀO (OVERLAY) --- */
        #wedding-overlay {
            position: fixed; inset: 0;
            display: flex; justify-content: center; align-items: center;
            z-index: 2000;
            background-image: url('anhbia.jpg'); /* Đảm bảo bạn có file này trên GitHub */
            background-size: cover;
            background-position: center;
            transition: opacity 1.5s cubic-bezier(0.4, 0, 0.2, 1), transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .main-card {
            position: relative; width: 85%; max-width: 420px;
            padding: 10px; border: 1px solid var(--gold-line); border-radius: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .glass-content {
            background: var(--glass-white);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            padding: 45px 20px; border-radius: 20px; text-align: center;
        }

        .btn-open {
            background-color: var(--primary-dark); color: white; border: none;
            padding: 13px 50px; border-radius: 30px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(122, 43, 45, 0.3);
            font-weight: 600; font-size: 1rem;
        }

        /* --- PHẦN 2: NỘI DUNG ẢNH DÀI --- */
        #main-invitation { 
            display: none; opacity: 0;
            transition: opacity 1.2s ease-out;
        }

        .wedding-page-img {
            width: 100%;
            display: block; /* Liền mạch không kẽ hở */
            max-width: 800px;
            margin: 0 auto;
        }

        /* Hiệu ứng chuyển cảnh */
        .stage-exit { opacity: 0 !important; transform: scale(1.1) !important; pointer-events: none; }
        .stage-enter { opacity: 1 !important; }

        /* Hoa rơi */
        .flower {
            position: fixed; top: -10px; z-index: 1500;
            pointer-events: none; animation: fall linear infinite;
        }
        @keyframes fall {
            0% { top: -10%; transform: rotate(0deg); opacity: 0.8; }
            100% { top: 110%; transform: rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="wedding-overlay">
        <div class="main-card" data-aos="zoom-in">
            <div class="glass-content">
                <div style="color: var(--primary-dark); font-size: 1.5rem;">❤</div>
                <p style="letter-spacing: 3px; font-size: 0.75rem; color: #555;">WEDDING INVITATION</p>
                <div style="font-family: 'Great Vibes'; font-size: 3.3rem; color: #2d3826;">Đức Huy</div>
                <div style="font-family: 'Great Vibes'; font-size: 1.6rem; color: var(--gold-line);">&</div>
                <div style="font-family: 'Great Vibes'; font-size: 3.3rem; color: #2d3826;">Minh Trân</div>
                <div style="margin: 15px 0; border-top: 1px solid #ddd; border-bottom: 1px solid #ddd; display: inline-block; padding: 5px 10px; letter-spacing: 3px;">09.05.2026</div>
                <p style="font-weight: 600; color: var(--primary-dark); margin-top: 20px;">Thân mời: Anh Minh Khôi</p>
                <button class="btn-open" onclick="openWedding()">Mở thiệp</button>
            </div>
        </div>
    </div>

    <div id="main-invitation">
        <img src="image_3b623f.jpg" class="wedding-page-img">
        <img src="image_3b629f.jpg" class="wedding-page-img">
        <img src="image_3b62be.jpg" class="wedding-page-img">
        <img src="image_3b62f8.jpg" class="wedding-page-img">
        <img src="image_3b631c.jpg" class="wedding-page-img">
        <img src="image_3b6622.jpg" class="wedding-page-img">
        
        <div style="text-align: center; padding: 80px 20px; background: #fff;">
            <p style="font-family: 'Great Vibes'; font-size: 2.5rem; color: var(--primary-dark);">Happy Wedding!</p>
            <p style="color: #888;">Cảm ơn bạn đã chung vui cùng gia đình chúng tôi.</p>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });

        function openWedding() {
            const overlay = document.getElementById('wedding-overlay');
            const mainContent = document.getElementById('main-invitation');
            
            overlay.classList.add('stage-exit');
            mainContent.style.display = 'block';
            
            setTimeout(() => {
                mainContent.classList.add('stage-enter');
                overlay.style.display = 'none';
                window.scrollTo(0, 0);
                AOS.refresh();
            }, 1000);
            
            setInterval(createFlower, 500);
        }

        function createFlower() {
            const flower = document.createElement('div');
