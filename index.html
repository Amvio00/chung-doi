<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đức Huy & Minh Trân Wedding</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Quicksand:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        :root {
            --primary-dark: #7a2b2d;
            --glass-white: rgba(255, 255, 255, 0.88); 
            --gold-line: #c4a484; /* Màu vàng đồng mảnh */
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Quicksand', sans-serif;
            background-color: #000;
        }

        /* NỀN SỬ DỤNG ANHBIA.JPG */
        #wedding-overlay {
            position: fixed; inset: 0;
            display: flex; justify-content: center; align-items: center;
            z-index: 1000;
            background-image: url('anhbia.jpg'); 
            background-size: cover;
            background-position: center;
            transition: 1s;
        }

        /* KHUNG THIỆP TỰ VẼ VIỀN (KHÔNG CẦN FILE 4.WEBP) */
        .main-card {
            position: relative;
            width: 85%;
            max-width: 420px;
            padding: 12px;
            /* Vẽ viền kép mảnh mai giống mẫu */
            border: 1px solid var(--gold-line);
            border-radius: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        /* Thêm một viền phụ bên trong cho sang trọng */
        .main-card::after {
            content: "";
            position: absolute;
            inset: 5px;
            border: 0.5px solid rgba(196, 164, 132, 0.4);
            border-radius: 20px;
            pointer-events: none;
        }

        .glass-content {
            background: var(--glass-white);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 45px 20px;
            border-radius: 18px;
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .icon-heart { color: var(--primary-dark); font-size: 1.5rem; margin-bottom: 5px; }
        
        .names {
            font-family: 'Great Vibes', cursive;
            font-size: 3.3rem;
            color: #2d3826; 
            margin: 8px 0;
            line-height: 1.1;
        }

        .date-text {
            letter-spacing: 4px;
            font-size: 0.9rem;
            color: #555;
            margin: 15px 0;
            border-top: 1px solid #eee;
            border-bottom: 1px solid #eee;
            padding: 5px 0;
            display: inline-block;
        }

        .guest-box {
            background: rgba(122, 43, 45, 0.08);
            color: var(--primary-dark);
            padding: 10px 25px;
            border-radius: 30px;
            display: inline-block;
            font-weight: 600;
            margin: 20px 0;
            min-width: 180px;
            border: 0.5px solid rgba(122, 43, 45, 0.2);
        }

        .btn-open {
            background-color: var(--primary-dark);
            color: white;
            border: none;
            padding: 13px 50px;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 4px 15px rgba(122, 43, 45, 0.4);
            transition: 0.3s;
        }

        .btn-open:hover { transform: scale(1.05); }

        #main-invitation { display: none; background: white; min-height: 100vh; }
    </style>
</head>
<body>

    <div id="wedding-overlay">
        <div class="main-card" data-aos="zoom-in" data-aos-duration="1200">
            <div class="glass-content">
                <div class="icon-heart">❤</div>
                <p style="letter-spacing: 3px; font-size: 0.75rem; color: #888; margin-bottom: 0;">WEDDING INVITATION</p>
                
                <div class="names">Đức Huy</div>
                <div style="font-size: 1.6rem; color: var(--gold-line); font-family: 'Great Vibes'; margin: -5px 0;">&</div>
                <div class="names">Minh Trân</div>
                
                <div class="date-text">09 . 05 . 2026</div>
                
                <p style="font-size: 0.8rem; color: #999; margin-top: 20px; letter-spacing: 1px;">THÂN MỜI</p>
                
                <div class="guest-box">
                    Anh Minh Khôi
                </div>
                
                <p style="font-size: 0.8rem; color: #777; line-height: 1.4;">Đến dự buổi tiệc chung vui<br>cùng gia đình chúng tôi</p>
                
                <button class="btn-open" onclick="openWedding()">Mở thiệp</button>
            </div>
        </div>
    </div>

    <div id="main-invitation">
        </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();
        function openWedding() {
            const overlay = document.getElementById('wedding-overlay');
            overlay.style.opacity = '0';
            overlay.style.transform = 'translateY(-50px)';
            setTimeout(() => {
                overlay.style.display = 'none';
                document.getElementById('main-invitation').style.display = 'block';
                window.scrollTo(0, 0);
            }, 800);
        }
    </script>
</body>
</html>
