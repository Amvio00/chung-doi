<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đức Huy & Minh Trân Wedding</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Playfair Display', serif;
            overflow-x: hidden;
        }

        .background {
            background-image: url('anhnen2.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .couple-container {
            display: flex;
            gap: 40px;
            justify-content: center;
            align-items: flex-start;
            margin-top: 20px;
        }

        /* Hiệu ứng khung ảnh nghiêng nhẹ giống như ảnh mẫu bạn gửi */
        .image-wrapper {
            opacity: 0;
            transform: translateY(40px) rotate(-3deg);
            animation: appear 2s ease-out forwards;
            text-align: center;
        }

        .image-wrapper.right {
            transform: translateY(40px) rotate(3deg);
            animation-delay: 1s;
        }

        .couple-img {
            width: 280px;
            height: 400px;
            object-fit: cover;
            border: 8px solid white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }

        /* Tên cô dâu chú rể */
        .name {
            font-family: 'Dancing Script', cursive;
            font-size: 2.2rem;
            color: #4a5d4a; /* Màu xanh lá sẫm giống trong ảnh mẫu */
            margin-top: 15px;
            opacity: 0;
            animation: fadeInText 1.5s ease-in forwards;
        }

        .chure .name { animation-delay: 1.5s; }
        .codau .name { animation-delay: 2.5s; }

        .sub-name {
            font-size: 0.9rem;
            color: #888;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Animations */
        @keyframes appear {
            to {
                opacity: 1;
                transform: translateY(0) rotate(-2deg); /* Giữ độ nghiêng nhẹ cho nghệ thuật */
            }
        }
        .right {
            @keyframes appearRight {
                to { opacity: 1; transform: translateY(0) rotate(2deg); }
            }
            animation-name: appearRight;
        }

        @keyframes fadeInText {
            to { opacity: 1; }
        }

        @media (max-width: 600px) {
            .couple-container { flex-direction: column; align-items: center; }
            .couple-img { width: 220px; height: 320px; }
        }
    </style>
</head>
<body>

    <div class="background">
        <div class="couple-container">
            <div class="image-wrapper chure">
                <img src="chure.webp" alt="Đức Huy" class="couple-img">
                <div class="sub-name">Út Nam</div>
                <div class="name">Đức Huy</div>
            </div>

            <div class="image-wrapper right codau">
                <img src="codau.webp" alt="Minh Trân" class="couple-img">
                <div class="sub-name">Út Nữ</div>
                <div class="name">Minh Trân</div>
            </div>
        </div>
    </div>

</body>
</html>
